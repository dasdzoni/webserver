- name: install apache
  apt:
    update_cache: yes
    name:
      - apache2
    state: present

- name: start and enable apache
  ansible.builtin.systemd:
    name: apache2
    state: started
    enabled: yes

- name: Copy SSL certificate files
  ansible.builtin.copy:
    src: files/ssl
    dest: /etc/apache2/
    owner: root
    group: root
    mode: 0644
    directory_mode:
  tags:
    - parentdir

- name: Enable SSL engine module
  community.general.apache2_module:
    name: ssl
    state: present

- include_tasks: copy-sites.yml
